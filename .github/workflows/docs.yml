name: Docs

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/docs.yml'
      - 'docs-site/**'
      - 'scripts/update_docs_reference.py'
      - 'src/ausecon_mcp/catalogue/**'
      - 'README.md'
      - 'pyproject.toml'
      - 'fastmcp.json'
  pull_request:
    paths:
      - '.github/workflows/docs.yml'
      - 'docs-site/**'
      - 'scripts/update_docs_reference.py'
      - 'src/ausecon_mcp/catalogue/**'
      - 'README.md'
      - 'pyproject.toml'
      - 'fastmcp.json'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docs-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: docs-site/.nvmrc
          cache: npm
          cache-dependency-path: docs-site/package-lock.json

      - name: Install docs dependencies
        working-directory: docs-site
        run: npm ci

      - name: Type-check docs
        working-directory: docs-site
        run: npm run check

      - name: Build docs
        working-directory: docs-site
        run: npm run build

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/dist

  deploy:
    if: github.event_name != 'pull_request'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
