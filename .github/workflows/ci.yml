name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Verify public repository hygiene
        shell: bash
        run: |
          test -f LICENSE
          if command -v rg >/dev/null 2>&1; then
            stale_refs=$(rg -n "rba_abs_mcp|<your-repo-url>" README.md docs-site examples pyproject.toml fastmcp.json server.json smithery.yaml Dockerfile.smithery || true)
          else
            stale_refs=$(grep -R -n -E "rba_abs_mcp|<your-repo-url>" README.md docs-site examples pyproject.toml fastmcp.json server.json smithery.yaml Dockerfile.smithery || true)
          fi
          if [ -n "$stale_refs" ]; then
            printf '%s\n' "$stale_refs"
            echo "Found stale public references"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }} --extra dev

      - name: Lint
        run: uv run ruff check src tests scripts

      - name: Test
        run: uv run pytest

      - name: Docker smoke build
        run: docker build .
